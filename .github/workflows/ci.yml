name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plugin-tests:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run check:coverage

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  picker-build:
    name: Picker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun install
        working-directory: picker
      - run: bun run build:picker

  packaging:
    name: Packaging checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check:packaging
      - run: npm pack --dry-run
      - run: |
          set -euo pipefail
          pkg="$(npm pack --silent)"
          tmp="$(mktemp -d)"
          npm install --ignore-scripts --prefix "$tmp" "./$pkg"
